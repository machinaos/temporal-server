name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  build-npm:
    name: Verify npm package
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '22'
      - run: npm install --ignore-scripts
      - run: npm pack --dry-run
